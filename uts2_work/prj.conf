CONFIG_USB_DEVICE_STACK_NEXT=y

#CONFIG_LOG=y

CONFIG_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USBD_CDC_ACM_CLASS=y

CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# Критично для stdin:
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y

#Включаем конечные автоматы
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_SMF_INSTRUMENTATION=y

#************* Настройка КЭШ **********************
CONFIG_ICACHE=y  #кэш команд
CONFIG_DCACHE=y  #кэш данных
CONFIG_CACHE_MANAGEMENT=y #функции управления кэш
CONFIG_NOCACHE_MEMORY=y   #разрешает настройку MPU


# ================== НАСТРОЙКИ ПОТОКОБЕЗОПАСНОГО ЛОГГЕРА ==================
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y     # Направляет вывод логов в системную консоль (наш USB)

CONFIG_CUSTOM_SEQ_MUX_ADC=y
CONFIG_CUSTOM_HC595_CHAIN=y

CONFIG_PINCTRL_DYNAMIC=y 

#Включаем zbus
CONFIG_ZBUS=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y

CONFIG_I2C=y
CONFIG_SENSOR=y

CONFIG_SPI=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_RTIO=y

# Драйвер датчиков TI INA
# (Включаем обе опции, компилятор сам выберет нужную для вашей версии Zephyr)
CONFIG_INA2XX=y


CONFIG_SAMPLE_USBD_PID=0x0001
CONFIG_SAMPLE_USBD_PRODUCT="USBD CDC ACM sample"

#Конфигурация перефирии
CONFIG_GPIO=y
CONFIG_COUNTER=y
CONFIG_PINCTRL=y


# DMA
CONFIG_DMA=y
CONFIG_DMA_STM32=y
CONFIG_DMA_LOG_LEVEL_DBG=y



# Added automatically by Workbench for Zephyr
#--- DEBUG PRESET - BEGIN ---#
# Set to -Og
CONFIG_DEBUG_OPTIMIZATIONS=y
# Thread awareness support
CONFIG_DEBUG_THREAD_INFO=y
# Generate stack usage per-function
CONFIG_STACK_USAGE=y
# Other options in case not set by default
CONFIG_BUILD_OUTPUT_HEX=y
CONFIG_BUILD_OUTPUT_META=y
CONFIG_OUTPUT_SYMBOLS=y
CONFIG_OUTPUT_STAT=y
CONFIG_OUTPUT_DISASSEMBLY=y
CONFIG_OUTPUT_PRINT_MEMORY_USAGE=y
#--- DEBUG PRESET - END ---#
