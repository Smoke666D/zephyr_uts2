description: Custom STM32 Timer-triggered DMA-GPIO-ADC Sequencer Driver

compatible: "custom,seq-mux-adc"

# Используем максимально надежный вертикальный формат списков для импорта
include:
  - base.yaml
  - pinctrl-device.yaml

properties:
  adc-dev:
    type: phandle
    required: true

  timer-dev:
    type: phandle
    required: true

  mux-gpios:
    type: phandle-array
    required: true
    description: GPIO specifiers for the 3 multiplexer address lines.
     
  adc-duration-us:
    type: int
    required: true

  switch-duration-us:
    type: int
    required: true

  resistors-r1:
    type: array
    required: true

  resistors-r2:
    type: array
    required: true